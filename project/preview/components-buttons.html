<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);} .card{padding:20px 24px;box-sizing:border-box;width:700px;} .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}</style></head><body><div class="card"><p class="label">Buttons</p><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button style="background:#E6097E;color:#fff;border:0;padding:14px 28px;font-family:var(--font-display);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:14px;cursor:pointer">Стать партнёром</button><button style="background:#0A0A0A;color:#fff;border:0;padding:14px 28px;font-family:var(--font-display);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:14px;cursor:pointer">Подробнее</button><button style="background:transparent;color:#0A0A0A;border:2px solid #0A0A0A;padding:12px 28px;font-family:var(--font-display);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:14px;cursor:pointer">Скачать PDF</button><button style="background:transparent;color:#E6097E;border:0;padding:14px 0;font-family:var(--font-display);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:14px;text-decoration:underline;cursor:pointer">Связаться →</button></div></div></body></html>
