<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);}
.card{padding:20px 24px;box-sizing:border-box;width:700px;}
.row{display:flex;gap:12px;align-items:flex-end;}
.swatch{flex:1;border:1px solid var(--rule);min-height:60px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;}
.swatch .name{font-size:12px;font-weight:700;letter-spacing:.04em;}
.swatch .hex{font-family:var(--font-mono);font-size:11px;opacity:.9;}
.swatch.lt{color:var(--fg-1);}
.label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}
.bullet{position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block;}
li.b{position:relative;padding-left:18px;margin-bottom:6px;list-style:none;}
ul.b{list-style:none;padding:0;margin:0;}
</style></head><body><div class="card"><p class="label">Neutrals</p><div class="row" style="gap:0"><div class="swatch lt" style="background:#FAFAFA;border:none"><div class="name">N-050</div><div class="hex">#FAFAFA</div></div><div class="swatch lt" style="background:#F2F2F2;border:none"><div class="name">N-100</div><div class="hex">#F2F2F2</div></div><div class="swatch lt" style="background:#E5E5E5;border:none"><div class="name">N-200</div><div class="hex">#E5E5E5</div></div><div class="swatch lt" style="background:#D1D1D1;border:none"><div class="name">N-300</div><div class="hex">#D1D1D1</div></div><div class="swatch lt" style="background:#B3B3B3;border:none"><div class="name">N-400</div><div class="hex">#B3B3B3</div></div><div class="swatch " style="background:#8C8C8C;border:none"><div class="name">N-500</div><div class="hex">#8C8C8C</div></div><div class="swatch " style="background:#6B6B6B;border:none"><div class="name">N-600</div><div class="hex">#6B6B6B</div></div><div class="swatch " style="background:#4A4A4A;border:none"><div class="name">N-700</div><div class="hex">#4A4A4A</div></div><div class="swatch " style="background:#2C2C2C;border:none"><div class="name">N-800</div><div class="hex">#2C2C2C</div></div><div class="swatch " style="background:#1A1A1A;border:none"><div class="name">N-900</div><div class="hex">#1A1A1A</div></div></div></div></body></html>
