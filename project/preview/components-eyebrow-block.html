<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);} .card{padding:20px 24px;box-sizing:border-box;width:700px;} .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}</style></head><body><div class="card"><p class="label">Eyebrow + content block (МЫ / ВЫ)</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:32px"><div style="border-left:4px solid #D1D1D1;padding-left:16px"><div style="font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:.04em;color:#1A1A1A;text-transform:uppercase">МЫ</div><ul style="margin:10px 0 0;padding:0;font-size:14px;color:#4A4A4A"><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>даем площадку и аудиторию</li><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>создаем сильное событие</li></ul></div><div style="border-left:4px solid #D1D1D1;padding-left:16px"><div style="font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:.04em;color:#1A1A1A;text-transform:uppercase">ВЫ</div><ul style="margin:10px 0 0;padding:0;font-size:14px;color:#4A4A4A"><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>выступаете как спикер</li><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>приглашаете учеников</li></ul></div></div></div></body></html>
