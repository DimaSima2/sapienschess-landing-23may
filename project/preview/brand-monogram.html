<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);}
.card{padding:20px 24px;box-sizing:border-box;width:700px;}
.label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}
.row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
.tile{background:#F4F4F4;padding:16px;display:grid;place-items:center;}
.tile.dark{background:#1A1A1A;}
.cap{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-align:center;letter-spacing:.04em;text-transform:uppercase;margin-top:6px;}
.col{display:flex;flex-direction:column;}
.usage{font-size:13px;color:var(--fg-3);margin:14px 0 0;max-width:500px;line-height:1.5;}
</style></head>
<body><div class="card">
<p class="label">SC Monogram — 2×2 (S · ♛ · ♚ · C)</p>
<div class="row">
  <div class="col"><div class="tile"><img src="../assets/monogram.png" style="width:96px;height:96px;display:block" alt=""></div><div class="cap">Light</div></div>
  <div class="col"><div class="tile" style="background:#F4F4F4"><img src="../assets/monogram.png" style="width:140px;height:140px;display:block" alt=""></div><div class="cap">Medium</div></div>
  <div class="col"><div class="tile dark"><img src="../assets/monogram.png" style="width:96px;height:96px;display:block;filter:invert(1)" alt=""></div><div class="cap">Inverted</div></div>
</div>
<p class="usage">Знак для уголков слайдов, аватаров соцсетей, фавикона, маркера событий. Чёткие квадраты 2×2: <b>S</b>, <b>♛</b>, <b>♚</b>, <b>C</b> — читается с дистанции и в малых размерах.</p>
</div></body></html>
