<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);}
.card{padding:20px 24px;box-sizing:border-box;width:700px;}
.row{display:flex;gap:12px;align-items:flex-end;}
.swatch{flex:1;border:1px solid var(--rule);min-height:60px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;}
.swatch .name{font-size:12px;font-weight:700;letter-spacing:.04em;}
.swatch .hex{font-family:var(--font-mono);font-size:11px;opacity:.9;}
.swatch.lt{color:var(--fg-1);}
.label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}
.bullet{position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block;}
li.b{position:relative;padding-left:18px;margin-bottom:6px;list-style:none;}
ul.b{list-style:none;padding:0;margin:0;}
</style></head><body><div class="card"><p class="label">Magenta Sapiens — primary accent</p><div class="row"><div class="swatch lt" style="background:#FBE0EE"><div class="name">SOFT</div><div class="hex">#FBE0EE</div></div><div class="swatch" style="background:#FF1F92"><div class="name">HOVER</div><div class="hex">#FF1F92</div></div><div class="swatch" style="background:#E6097E"><div class="name">BASE</div><div class="hex">#E6097E</div></div><div class="swatch" style="background:#C2086C"><div class="name">PRESSED</div><div class="hex">#C2086C</div></div></div></div></body></html>
