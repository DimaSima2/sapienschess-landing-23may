<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);} .card{padding:20px 24px;box-sizing:border-box;width:700px;} .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}</style></head><body><div class="card"><p class="label">Photo rail</p><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px"><div style="aspect-ratio:1;background:#D1D1D1;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-weight:700;letter-spacing:.04em">PHOTO</div><div style="aspect-ratio:1;background:#D1D1D1;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-weight:700;letter-spacing:.04em">PHOTO</div><div style="aspect-ratio:1;background:#D1D1D1;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-weight:700;letter-spacing:.04em">PHOTO</div><div style="aspect-ratio:1;background:#D1D1D1;display:flex;align-items:center;justify-content:center;color:#8C8C8C;font-weight:700;letter-spacing:.04em">PHOTO</div></div><p style="font-size:12px;color:var(--fg-3);margin:10px 0 0">Square thumbs, hard corners, gap-12. Always B&amp;W.</p></div></body></html>
