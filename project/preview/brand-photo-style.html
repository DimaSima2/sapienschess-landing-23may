<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);} .card{padding:20px 24px;box-sizing:border-box;width:700px;} .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}</style></head><body><div class="card"><p class="label">Photography style</p><ul style="font-family:var(--font-body);font-size:14px;line-height:1.6;color:#4A4A4A;padding:0;margin:0"><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span><b>Black &amp; white</b> only — deep contrast, real tournament moments.</li><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>Square or 4:3 crops. <b>No rounding. No shadow.</b></li><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>Subjects: <b>kids mid-move, hands on pieces, audiences, trophies, signage</b>.</li><li style="position:relative;padding-left:18px;margin-bottom:6px;list-style:none"><span style="position:absolute;left:0;top:7px;width:8px;height:8px;background:#0A0A0A;display:inline-block"></span>Color is reserved for staged shots (the chimps cover) — never as a filter.</li></ul></div></body></html>
