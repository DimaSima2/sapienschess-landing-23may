<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--fg-1);} .card{padding:20px 24px;box-sizing:border-box;width:700px;} .label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-3);font-weight:700;margin:0 0 10px;}</style></head><body><div class="card"><p class="label">Radii — the brand is hard-edged</p><div style="display:flex;gap:24px;align-items:center;font-family:var(--font-mono);font-size:11px;color:var(--fg-3)"><div style="text-align:center"><div style="width:80px;height:80px;background:#1A1A1A;border-radius:0"></div><div style="margin-top:6px">r-0 · 0</div></div><div style="text-align:center"><div style="width:80px;height:80px;background:#1A1A1A;border-radius:2px"></div><div style="margin-top:6px">r-1 · 2</div></div><div style="text-align:center"><div style="width:80px;height:80px;background:#1A1A1A;border-radius:4px"></div><div style="margin-top:6px">r-2 · 4</div></div><div style="text-align:center"><div style="width:120px;height:36px;background:#E6097E;border-radius:999px"></div><div style="margin-top:6px">r-pill</div></div></div><p style="font-size:12px;color:var(--fg-3);margin:14px 0 0">Default to 0. Reserve pill for marketing-web buttons only.</p></div></body></html>
